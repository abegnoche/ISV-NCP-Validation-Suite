# my-isv VM Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic VM template and wires the
# commands to the generic template stubs in stubs/my-isv/vm/*. Those stubs ship
# with dummy-success values so this example runs end-to-end without any
# real cloud infrastructure.
#
# Coverage:
#   This example exercises only the pure JSON-contract validations
#   (InstanceStateCheck, InstanceCreatedCheck, InstanceListCheck,
#    InstanceTagCheck, InstanceStopCheck, InstanceStartCheck,
#    StableIdentifierCheck, InstanceRebootCheck, SerialConsoleCheck,
#    StepSuccessCheck). SSH-based host checks (ConnectivityCheck,
#    GpuCheck, DriverCheck, CpuInfoCheck, NIM checks, etc.) are excluded
#    via `exclude.markers: [ssh]` because a dummy-success stub cannot
#    spin up a real host to SSH into. The deploy_nim / teardown_nim
#    steps are also skipped for the same reason.
#
# Steps:
#   SETUP
#     1. launch_instance  - Provision a GPU VM
#   TEST
#     2. list_instances   - Find it in the VPC
#     3. verify_tags      - Verify user-defined tags
#     4. stop_instance    - Stop the VM
#     5. start_instance   - Start it back up
#     6. reboot_instance  - Reboot it
#     7. serial_console   - Confirm serial console access
#     8. deploy_nim       - SKIPPED (needs real SSH)
#   TEARDOWN
#     9. teardown_nim     - SKIPPED (needs real SSH)
#    10. teardown         - Terminate the VM
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/vm.yaml

import:
  - ../../tests/vm.yaml

version: "1.0"

commands:
  vm:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: launch_instance
        phase: setup
        command: "python ../../stubs/my-isv/vm/launch_instance.py"
        args:
          - "--name"
          - "isv-test-gpu"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: list_instances
        phase: test
        command: "python ../../stubs/my-isv/vm/list_instances.py"
        args:
          - "--vpc-id"
          - "{{steps.launch_instance.vpc_id}}"
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: verify_tags
        phase: test
        command: "python ../../stubs/my-isv/vm/describe_tags.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: stop_instance
        phase: test
        command: "python ../../stubs/my-isv/vm/stop_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: start_instance
        phase: test
        command: "python ../../stubs/my-isv/vm/start_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 60

      - name: reboot_instance
        phase: test
        command: "python ../../stubs/my-isv/vm/reboot_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 60

      - name: serial_console
        phase: test
        command: "python ../../stubs/my-isv/vm/serial_console.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # Skipped: deploy_nim and teardown_nim stubs SSH into a real host
      # to run a NIM container. The dummy-success stubs can't satisfy them.
      - name: deploy_nim
        phase: test
        skip: true
        command: "python ../../stubs/common/deploy_nim.py"
        args:
          - "--host"
          - "{{steps.reboot_instance.public_ip}}"
          - "--key-file"
          - "{{steps.reboot_instance.key_file}}"
        timeout: 60

      - name: teardown_nim
        phase: teardown
        skip: true
        command: "python ../../stubs/common/teardown_nim.py"
        args:
          - "--host"
          - "{{steps.reboot_instance.public_ip}}"
          - "--key-file"
          - "{{steps.reboot_instance.key_file}}"
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../../stubs/my-isv/vm/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
          - "{{teardown_flag}}"
        timeout: 60

tests:
  cluster_name: "my-isv-vm-validation"
  description: "my-isv VM lifecycle validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    instance_type: "my-isv.gpu.1x"

  # Skip SSH-based host checks (ConnectivityCheck, GpuCheck, DriverCheck,
  # CpuInfoCheck, CloudInitCheck, NIM checks, etc.) — they'd try to connect
  # to the dummy public_ip. Pure JSON-contract checks still run.
  exclude:
    markers: ["ssh"]
