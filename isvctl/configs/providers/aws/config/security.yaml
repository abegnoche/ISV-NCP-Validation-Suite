# AWS Security Validation Configuration
#
# Imports validations from the provider-agnostic security canonical config.
# This file only provides AWS-specific commands (boto3 scripts) and settings.
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/security.yaml
#
# Estimated runtime: ~1-2 minutes
#
# Security tests (SEC* requirements):
#   1. BMC Management Network - Verify BMC management is dedicated/restricted
#   2. BMC Tenant Isolation   - Verify BMC/IPMI/Redfish unreachable from VPC
#   3. BMC Protocol Security  - Verify CNP10-01 BMC protocol posture
#   4. API Endpoint Isolation - Verify management APIs are not publicly exposed
#   5. MFA Enforcement        - Verify admin interfaces (UI, CLI, API) require MFA
#   6. SA Credential Auth     - Verify IAM user + long-lived access key auth
#   7. OIDC User Auth         - Probe configured OIDC-protected platform endpoint (SEC01-01)

import:
  - ../../../suites/security.yaml

version: "1.0"

commands:
  security:
    phases: ["setup", "test", "teardown"]
    steps:
      # Preflight: minimal setup step so the orchestrator runs teardown
      - name: preflight
        phase: setup
        command: "echo"
        args: ["{\"success\": true, \"platform\": \"security\", \"test_name\": \"preflight\"}"]
        timeout: 10

      # Test 1: BMC Management Network (~10s)
      - name: bmc_management_network
        phase: test
        command: "python3 ../scripts/security/bmc_management_network_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 2: BMC Tenant Isolation (~10s)
      - name: bmc_tenant_isolation
        phase: test
        command: "python3 ../scripts/security/bmc_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 3: BMC Protocol Security (AWS has no customer BMC endpoint)
      - name: bmc_protocol_security
        phase: test
        command: "python3 ../scripts/security/bmc_protocol_security_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 4: API Endpoint Isolation (~15s)
      - name: api_endpoint_isolation
        phase: test
        command: "python3 ../scripts/security/api_endpoint_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 5: MFA Enforcement (~10s)
      - name: mfa_enforcement
        phase: test
        command: "python3 ../scripts/security/mfa_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 6: Service Account Credential Auth (~30s, includes IAM propagation wait)
      - name: sa_credential_test
        phase: test
        command: "python3 ../scripts/security/sa_credential_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      # Test 7: OIDC User Authentication
      # Requires a real issuer, audience, protected target endpoint, and token
      # fixtures. Non-sensitive endpoint settings can come from tests.settings
      # below; token fixtures are read by the script from OIDC_*_TOKEN env vars
      # or passed through token-file arguments in a custom overlay.
      - name: oidc_user_auth_test
        phase: test
        command: "python3 ../scripts/security/oidc_user_auth_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--issuer-url={{oidc_issuer_url}}"
          - "--audience={{oidc_audience}}"
          - "--target-url={{oidc_target_url}}"
        sensitive_args:
          - "--valid-token"
          - "--wrong-issuer-token"
          - "--wrong-audience-token"
          - "--expired-token"
          - "--missing-required-claim-token"
        timeout: 60

      # Teardown: Clean up leftover test IAM users
      - name: teardown
        phase: teardown
        command: "python3 ../scripts/security/teardown.py"
        args: ["--region", "{{region}}"]
        timeout: 60

tests:
  cluster_name: "aws-security-validation"
  description: "AWS infrastructure security hardening validation"

  settings:
    region: "us-west-2"
    oidc_issuer_url: "{{env.OIDC_ISSUER_URL | default('', true)}}"
    oidc_audience: "{{env.OIDC_AUDIENCE | default('', true)}}"
    oidc_target_url: "{{env.OIDC_TARGET_URL | default('', true)}}"
