# ISO/Image Import Validation - Template Configuration
#
# This is a PROVIDER-AGNOSTIC template for testing disk image import
# lifecycle: upload image -> launch instance -> teardown.
# Copy this file and the accompanying stubs/ scripts, then replace the
# script implementations with your platform's API calls.
#
# Architecture:
#   - Scripts: Platform-specific (YOU implement these) - handle cloud operations
#   - Validations: Platform-agnostic (provided) - just check JSON output
#   - Schema: Uses generic field names (image_id, storage_bucket, disk_ids)
#
# Contract:
#   Each script MUST print a JSON object to stdout. The validations
#   only inspect that JSON. As long as your scripts output the right
#   fields, the validations pass regardless of which cloud you use.
#
# Steps:
#   1. upload_image     (setup)    - Download image, upload to storage, import
#   2. launch_instance  (test)     - Create GPU instance from imported image
#   3. teardown         (teardown) - Clean up all resources
#
# Quick start:
#   1. Copy this folder:  cp -r templates/ my-isv/
#   2. Edit the stubs:    my-isv/stubs/iso/*.py
#   3. Run:               uv run isvctl test run -f isvctl/configs/my-isv/iso.yaml
#
# See also:
#   - AWS reference implementation: ../aws/iso.yaml + ../stubs/aws/iso/
#   - JSON schemas: isvctl/src/isvctl/config/output_schemas.py

version: "1.0"

commands:
  iso:
    phases: ["setup", "test", "teardown"]
    steps:
      # ─── Step 1: Upload Image ──────────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "iso",
      #     "image_id": "<imported-image-id>",
      #     "storage_bucket": "<bucket-or-storage-name>",
      #     "disk_ids": ["<snapshot-or-disk-id>"]
      #   }
      - name: upload_image
        phase: setup
        command: "python3 ./stubs/iso/upload_image.py"
        args:
          - "--image-url"
          - "{{image_url}}"
          - "--image-format"
          - "{{image_format}}"
          - "--region"
          - "{{region}}"
        timeout: 3600

      # ─── Step 2: Launch Instance from Image ────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "iso",
      #     "instance_id": "<unique-id>",
      #     "public_ip": "<ip-address>",
      #     "key_path": "<path-to-ssh-key>",
      #     "instance_state": "running",
      #     "key_name": "<key-pair-name>",
      #     "security_group_id": "<sg-id>",
      #     "instance_profile": "<profile-name>"
      #   }
      - name: launch_instance
        phase: test
        command: "python3 ./stubs/iso/launch_instance.py"
        args:
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 600

      # ─── Step 3: Teardown ──────────────────────────────────────────
      # YOUR SCRIPT must clean up all resources: instance, image,
      # storage, keys, security groups.
      - name: teardown
        phase: teardown
        command: "python3 ./stubs/iso/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--disk-ids"
          - "{{steps.upload_image.disk_ids | join(',')}}"
          - "--bucket-name"
          - "{{steps.upload_image.storage_bucket}}"
          - "--key-name"
          - "{{steps.launch_instance.key_name}}"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "--instance-profile"
          - "{{steps.launch_instance.instance_profile}}"
          - "--region"
          - "{{region}}"
          - "{{teardown_flag}}"
        timeout: 1800

tests:
  cluster_name: "iso-validation"
  description: "ISO/image import validation tests (template)"
  platform: iso

  settings:
    region: "us-west-2"
    image_url: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.vmdk"
    image_format: "vmdk"
    instance_type: "g4dn.xlarge"
    teardown_flag: "{{(env.ISO_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    iso_import:
      step: upload_image
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["image_id", "storage_bucket", "disk_ids"]
        - FieldValueCheck:
            field: "success"
            expected: true

    instance_launch:
      step: launch_instance
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["instance_id", "public_ip", "key_path"]
        - InstanceStateCheck:
            expected_state: "running"

    ssh:
      step: launch_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "ubuntu"

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
